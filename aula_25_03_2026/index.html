<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula03</title>
    <script>
        //Variável do tipo objeto
        let pessoa = {
            nome: 'Helton',
            idade: 72,
            profissao: 'Coordenador',
            salario_mes: 97125.40,
            cabeludo: false
        }
        console.log('Tipo: ' + typeof pessoa);
        console.log('Valor: ', pessoa);
        console.log('Nome: ', pessoa.nome);
        console.log('Salario: ', pessoa.salario_mes);

        pessoa.salario_mes = 97125.42;
        console.log('Salario atualizado: ', pessoa.salario_mes);

        let curso = {
            nomeCurso: 'ADS',
            coordenador: pessoa,
            instituicao: 'UP'
        }
        console.log(curso);

        //Variável do tipo array
        let professores = [
            { nome: 'Juliana', materia: 'Java', salario: 40321.90 },
            { nome: 'Joao Victor', materia: 'Algoritmos', salario: 60321.82 },
            { nome: 'Thiago Detoni', materia: 'Banco de Dados', salario: 300450.23 }
        ]
        console.log('Tipo: ', typeof professores);
        console.log('Valor: ', professores);
        console.log('Professor 2', professores[1]);

        curso.professores = professores;
        console.log('Curso Final: ', curso);
        console.log('Salario do Detoni: ', curso.professores[2].salario);

        let sauda = function saudacao() {
            console.log('Olá, seja bem vindo!');
        }
        //saudacao();
        //console.log('Tipo: ', typeof saudacao);
        console.log('Tipo de sauda: ', typeof sauda);

        function cumprimenta(nome = 'Anonimo') {
            console.log(`Boa noite ${nome}, bem vindo!`);
        }
        cumprimenta();
        cumprimenta('Alex');

        let fruta = 'Abacaxi';
        console.log('Tipo: ', typeof fruta);
        fruta = 'Maca' + 123;
        console.log('Tipo: ', typeof fruta);

        //Exemplo de CAST implícito
        let idade = 22;
        console.log('Tipo idade: ', typeof idade);
        idade = 23 + 'anos';
        console.log('Novo tipo de idade: ', typeof idade);

        let preco = 45.99;
        console.log('Tipo de preco: ', typeof preco);
        let precoConvertido = String(preco);
        console.log('Novo tipo de preco: ', typeof precoConvertido);

        let dia = '' + 23;
        console.log('Tipo de dia: ', typeof dia);
        diaMes = Number(dia);
        console.log('Tipo de diaMes: ', typeof diaMes);
        console.log('Valor dia mes: ', diaMes);

        if ('5' == 5) {
            console.log('5 string é igual a 5 numero');
        }

        if ('5' === 5) {
            console.log('5 string é estritamente igual a 5 numero');
        }

        if (true) {
            console.log('É verdadeiro!');
        } else {
            console.log('Não é verdadeiro!');
        }

        const CARRO = 'Punto';

        if (CARRO === 'Punto') {
            console.log('Marca: Fiat');
        } else if (CARRO === 'Corsa') {
            console.log('Marca: GM');
        } else if (CARRO === 'Hilux') {
            console.log('Marca Toyota');
        } else if (CARRO === 'Panto') {
            console.log('Marca: GTA');
        }

        for (let i = 1; i <= 50; i++) {
            console.log('Valor de i: ', i);
            if (i === 15) continue;
            if (i === 20) {
                break;
            } 
        }

        let j = 10;
        for(;;){
            if(j <= 5) break;
            console.log('Valor de J: ', j);
            j--;

            let k = 1;
            while(k <= 10) {
                if(k === 5) continue;
                console.log('Valor de k: ', k);
                k++;
            }
        }
    </script>
</head>

<body>
    <h3>Aula#03</h3>
</body>

</html>
