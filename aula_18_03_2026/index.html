<html>
	<head>
		<title>Página Aula 01</title>
		<script>
			// console.log("LEC > Operário!");
			var fruta;
			fruta = "Abacaxi";
			console.log(fruta);
			fruta = "Morango";
			console.log(fruta);

			var fruta = "Limão";
			console.log(fruta);

			let professor;
			professor = "Helton";
			console.log(professor);

			professor = "João Victor";
			console.log(professor);

			// Erro: não pode redeclarar let
			// let professor;

			const IDADE = 18;
			console.log("Idade: " + IDADE);

			// Errado: Não se pode alterar valor de const
			// IDADE = 19;
			// console.log(IDADE);

			bebida = "Água";
			console.log(`Bebida: ${bebida}`);

			bebida2 = "Tequila";

			// drink = bebida + " gelada";
			drink = `${bebida} gelada, ${bebida2}`;
			console.log(drink);

			if(true){
				// Camel Case: Separar palavras com letra maiúscula
				var varVariable = "Eu sou uma VAR";
				let letVariable = "Eu sou uma LET";
				const constVariable = "Eu sou uma CONST";
			}

			console.log(varVariable);
			// As Variáveis LET e CONST não podem ser acessadas fora do bloco! 
			// console.log(letVariable);
			// console.log(constVariable);

			let variavelHelton;
			console.log(typeof variavelHelton);

			variavelHelton = "Desprovido de cabelos";
			console.log(variavelHelton);
			console.log(typeof variavelHelton);
			variavelHelton = 123;
			console.log(typeof variavelHelton);

			variavelHelton = true;
			console.log(typeof variavelHelton);
		</script>
	</head>
	<body>
		<h1>Helton Careca<h1>
	</body>
</html>
